name: Voyago CI/CD

# This runs automatically every time you push code to the main branch
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── TEST JOB ──────────────────────────────────────────────────────────────
  # Runs Jest tests to make sure nothing is broken before deploying
  test:
    runs-on: ubuntu-latest

    # Spin up a Redis service for tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run backend tests
        run: cd backend && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_jwt_secret_for_ci
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          REDIS_URL: redis://localhost:6379

  # ── BUILD JOB ─────────────────────────────────────────────────────────────
  # Runs after tests pass — compiles TypeScript to JavaScript
  build:
    needs: test   # only runs if test job passes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and build backend
        run: |
          cd backend
          npm ci
          npm run build

      - name: Install and build frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
